name: Mise a jour quotidienne GEX/DEX

on:
  schedule:
    # Se lance à 23h30 UTC du Lundi au Vendredi (après la clôture des marchés US)
    - cron: '30 23 * * 1-5'
  workflow_dispatch: # Permet de déclencher le script manuellement avec un bouton

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Donne le droit de pousser le JSON
    
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le script Python
        run: python updater.py

      - name: Sauvegarder et pousser le JSON
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data_dashboard.json
          # S'il n'y a pas de nouvelle donnée, on ignore l'erreur
          git commit -m "Mise à jour automatique des données" || exit 0
          git push
